server {
    listen 80;
    server_name localhost;

    # Serve static frontend files
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API to the gateway service. Use Docker DNS + variable proxy_pass so the
    # upstream IP is re-resolved after gateway restarts (static proxy_pass caches
    # the first resolve and can hit a stale IP → connection refused / 502).
    location /api/ {
        resolver 127.0.0.11 ipv6=off valid=10s;
        set $gateway_upstream http://gateway:49999;
        proxy_pass $gateway_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
