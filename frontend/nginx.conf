# Self-signed certs are generated in the image (Dockerfile). For a public hostname,
# mount real PEMs over /etc/nginx/ssl/cert.pem and /etc/nginx/ssl/key.pem (see docker-compose).

server {
    listen 80;
    server_name localhost;

    # Serve static frontend files
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API to the gateway service. Use Docker DNS + variable proxy_pass so the
    # upstream IP is re-resolved after gateway restarts (static proxy_pass caches
    # the first resolve and can hit a stale IP → connection refused / 502).
    location /api/ {
        resolver 127.0.0.11 ipv6=off valid=10s;
        set $gateway_upstream http://gateway:49999;
        proxy_pass $gateway_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    server_name localhost;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        resolver 127.0.0.11 ipv6=off valid=10s;
        set $gateway_upstream http://gateway:49999;
        proxy_pass $gateway_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
