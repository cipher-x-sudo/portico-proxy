# Trust CF-Connecting-IP only from Docker bridge (e.g. cloudflared) so public :8080 clients cannot spoof it.
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;
real_ip_header CF-Connecting-IP;

# cloudflared sets X-Forwarded-Proto for HTTPS clients; fall back to $scheme for direct local hits.
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;
    server_name proxy.prismacreative.online localhost;

    # Serve static frontend files
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API to the gateway service. Use Docker DNS + variable proxy_pass so the
    # upstream IP is re-resolved after gateway restarts (static proxy_pass caches
    # the first resolve and can hit a stale IP → connection refused / 502).
    location /api/ {
        resolver 127.0.0.11 ipv6=off valid=10s;
        set $gateway_upstream http://gateway:49999;
        proxy_pass $gateway_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }
}
