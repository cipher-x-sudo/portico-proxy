# Portico — dynamic VPN proxy gateway + on-demand worker containers (Linux / Windows Docker Desktop).
# One proxy port per location; gateway listens on portBase, portBase+1, ... . Host and container published ranges
# must have the same width (see DOCKER_PROXY_* in .env.example). Width must be >= locationSpec.count.
# ovpn_data: set OVPN_HOST_PATH in .env to your .ovpn folder (e.g. E:/FB/protonusa/ovpn on Windows). Default ./ovpn (run compose from repo root).
# Dashboard + proxy ports publish on 0.0.0.0 (public IP). clientProxyHost in openvpn-proxy-config.json is optional:
# the gateway auto-detects public IPv4 when empty (see autoDetectClientProxyHost); set clientProxyHost for DNS/LAN.
# For local-only, use 127.0.0.1 instead of 0.0.0.0 on the frontend :8080 and gateway proxy range lines below.
#
# The gateway may start extra worker containers (proxy-<port>) on proxynet. On SIGTERM/SIGINT it stops them
# before exit; stop_grace_period on the gateway gives time for that during "docker compose down".

services:
  worker:
    build:
      context: ./backend
      dockerfile: docker/worker/Dockerfile
    image: portico-worker
    entrypoint: ["/usr/bin/true"]
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: portico-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - proxynet
    restart: unless-stopped

  gateway:
    build:
      context: ./backend
      dockerfile: docker/gateway/Dockerfile
    image: portico-gateway
    container_name: portico-gateway
    depends_on:
      - worker
      - redis
    environment:
      - USE_DOCKER=1
      - DOCKER_IMAGE=portico-worker
      - DOCKER_NETWORK=proxynet
      - DOCKER_OVPN_VOLUME=ovpn_data
      # OpenVPN provider credentials (set in .env; do not commit secrets)
      - OPENVPN_USERNAME=${OPENVPN_USERNAME:-}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD:-}
      # Path where ovpn_data is mounted inside gateway (must match worker /ovpn)
      - DOCKER_OVPN_MOUNT=/ovpn
      # Host-side ports shown in the UI (must match left side of proxy port mapping below).
      # Default 58000+ avoids common Windows Hyper-V excluded ranges that break binds in 51k (e.g. 51273).
      - PUBLISHED_PROXY_PORT_BASE=${PUBLISHED_PROXY_PORT_BASE:-58000}
      # Mirrored from compose port publish line so the gateway can warn on count/range misalignment.
      - DOCKER_PROXY_HOST_PORT_FIRST=${DOCKER_PROXY_HOST_PORT_FIRST:-58000}
      - DOCKER_PROXY_HOST_PORT_LAST=${DOCKER_PROXY_HOST_PORT_LAST:-58515}
      - DOCKER_PROXY_CONTAINER_PORT_FIRST=${DOCKER_PROXY_CONTAINER_PORT_FIRST:-50000}
      - DOCKER_PROXY_CONTAINER_PORT_LAST=${DOCKER_PROXY_CONTAINER_PORT_LAST:-50515}
      # OVPN picks + activePorts (survives compose restarts; AOF volume below)
      - REDIS_URL=redis://redis:6379/0
      - REDIS_STATE_KEY=portico:assignments-state
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backend/openvpn-proxy-config.json:/config/openvpn-proxy-config.json
      - ./backend/openvpn-proxy-assignments.json:/config/openvpn-proxy-assignments.json
      # Same bind/volume as workers so gateway can list and validate real .ovpn files (fixes UI showing config-only names missing on disk).
      - ovpn_data:/ovpn:ro
    ports:
      - "127.0.0.1:49999:49999"           # control API bound to localhost only
      # Host:container ranges must span the same number of TCP ports; align portBase in openvpn-proxy-config.json with CONTAINER_FIRST.
      # Host 0.0.0.0: reachable on the VPS public IP (use host firewall + strong proxy auth). Use 127.0.0.1 for local-only.
      - "0.0.0.0:${DOCKER_PROXY_HOST_PORT_FIRST:-58000}-${DOCKER_PROXY_HOST_PORT_LAST:-58515}:${DOCKER_PROXY_CONTAINER_PORT_FIRST:-50000}-${DOCKER_PROXY_CONTAINER_PORT_LAST:-50515}"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    init: true
    stop_grace_period: 60s
    networks:
      - proxynet
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: portico-frontend
    container_name: portico-frontend
    depends_on:
      - gateway
    ports:
      # 0.0.0.0: dashboard on public IP. Use 127.0.0.1:8080:80 for local-only.
      - "0.0.0.0:8080:80"
      # HTTPS (self-signed in image). Mount your own cert/key over /etc/nginx/ssl/*.pem for a real CA.
      - "0.0.0.0:8443:443"
    networks:
      - proxynet
    restart: unless-stopped

networks:
  proxynet:
    driver: bridge

volumes:
  redis_data:
  # Bind-mount host folder with .ovpn files. On Windows set OVPN_HOST_PATH in .env to absolute path (e.g. E:\FB\protonusa\ovpn).
  ovpn_data:
    name: ovpn_data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${OVPN_HOST_PATH:-./ovpn}
